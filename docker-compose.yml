version: "3.9"

services:
  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "4200:80"
    depends_on:
      - estoque
      - faturamento
    networks:
      - app-network

  # ── Microsserviço 1 – Serviço de Estoque ──────────────────────
  estoque:
    build:
      context: ./backend/estoque
      dockerfile: Dockerfile
    container_name: estoque
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/estoque_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    depends_on:
      - postgres
    networks:
      - app-network

  # ── Microsserviço 2 – Serviço de Faturamento ──────────────────
  faturamento:
    build:
      context: ./backend/faturamento
      dockerfile: Dockerfile
    container_name: faturamento
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/faturamento_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    depends_on:
      - postgres
      - estoque
    networks:
      - app-network

  # ── Banco de Dados ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: estoque_db,faturamento_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
